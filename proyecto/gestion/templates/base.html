<!DOCTYPE html>
<html>
<head>
    <title>Gestión</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; margin:0; }
        header { background:#2c3e50; color:white; padding:15px; text-align:center; }
        .container { width:80%; margin:30px auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        button { background:#3498db; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; }
        .danger { background:#e74c3c; }
        a { text-decoration:none; }
    </style>
</head>
<body>
<header><h1>Sistema de Gestión</h1></header>
<div class="container">
{% block content %}{% endblock %}
</div>
